version: '3.8'

services:
  # MongoDB数据库
  mongodb:
    image: mongo:6.0
    container_name: dream-ai-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: dream-ai
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - "27017:27017"
    networks:
      - dream-ai-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # FastAPI后端应用
  backend:
    build: .
    container_name: dream-ai-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      # 服务器配置
      APP_NAME: 筑梦AI支教
      APP_VERSION: 1.0.0
      DEBUG: "False"
      HOST: 0.0.0.0
      PORT: 8000
      
      # 数据库配置
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/dream-ai?authSource=admin
      
      # JWT配置
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this-in-production-min-32-chars}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
      
      # CORS配置
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5500}
      
      # 文件上传配置
      UPLOAD_DIR: ./uploads
      MAX_FILE_SIZE: 10485760
      ALLOWED_EXTENSIONS: .jpg,.jpeg,.png,.gif,.pdf,.doc,.docx,.txt,.glb,.gltf
      
      # 日志配置
      LOG_LEVEL: INFO
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./app:/app/app:ro
    ports:
      - "8000:8000"
    networks:
      - dream-ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      sh -c "uvicorn app.main:app 
      --host 0.0.0.0 
      --port 8000 
      --workers 4 
      --log-level info 
      --access-log 
      --proxy-headers 
      --forwarded-allow-ips '*'"

  # MongoDB管理界面 (可选)
  mongo-express:
    image: mongo-express:latest
    container_name: dream-ai-mongo-express
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "8081:8081"
    networks:
      - dream-ai-network

  # Nginx反向代理 (可选，用于生产环境)
  nginx:
    image: nginx:alpine
    container_name: dream-ai-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - dream-ai-network

# 网络配置
networks:
  dream-ai-network:
    driver: bridge
    name: dream-ai-network

# 数据卷配置
volumes:
  mongodb_data:
    name: dream-ai-mongodb-data