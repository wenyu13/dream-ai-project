<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微光循迹 - 智慧支教生态系统</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 原有 Style 保持不变 -->
</head>
<body>
    <nav>
        <div class="brand">微光循迹</div>
        <div class="nav-links">
            <a href="#">首页</a>
            <a href="#jobs">寻找岗位</a>
            <a href="#tools">3D教具库</a>
            <div class="dropdown">
                <a href="javascript:void(0)" class="dropdown-toggle">更多 ▼</a>
                <div class="dropdown-menu">
                    <a href="javascript:void(0)" onclick="openModal('aiAssistantWindow')">AI咨询</a>
                    <a href="volunteer.html">进入工作台</a>
                </div>
            </div>
            <!-- 访客显示 -->
            <div id="guestNav">
                <button class="login-btn" id="loginBtn">登录</button>
                <button class="register-btn" id="registerBtn">注册</button>
            </div>
            <!-- 登录后显示 -->
            <div id="userNav" style="display:none; align-items:center; gap:15px;">
                <span class="user-name" style="font-weight:bold; color:var(--primary-green);"></span>
                <button id="logoutBtn" style="cursor:pointer; background:none; border:1px solid #ccc; padding:5px 10px; border-radius:5px;">退出</button>
            </div>
        </div>
    </nav>

    <section class="hero-section">
        <div class="hero-content">
            <h1 class="hero-main-title">用<span>科技</span>点亮<span>大山</span>的晨曦</h1>
            <p class="hero-subtitle">微光循迹：赋能乡村振兴的数字化志愿服务交互平台</p>
            <a href="#portals" class="hero-btn">开启支教之旅</a>
        </div>
    </section>

    <!-- ... 这里是原有的 portals, stats, jobs, tools 部分保持不变 ... -->

    <!-- 登录弹窗 -->
    <div class="identity-modal" id="loginModal">
        <div class="modal-content">
            <div class="modal-header"><h3>用户登录</h3><button onclick="closeModal('loginModal')">✕</button></div>
            <div class="modal-body">
                <div class="form-group"><label>邮箱</label><input type="email" id="loginEmail"></div>
                <div class="form-group"><label>密码</label><input type="password" id="loginPassword"></div>
                <button class="hero-btn" id="doLogin" style="width:100%; margin-top:20px;">登录</button>
                <button class="btn-cancel" onclick="closeModal('loginModal')" style="width:100%; margin-top:10px; background:#eee; color:#333; border:none; padding:10px; border-radius:50px; cursor:pointer;">取消</button>
            </div>
        </div>
    </div>

    <!-- 注册弹窗 -->
    <div class="identity-modal" id="registerModal">
        <div class="modal-content">
            <div class="modal-header"><h3>加入微光循迹</h3><button onclick="closeModal('registerModal')">✕</button></div>
            <div class="modal-body">
                <div class="form-group"><label>邮箱</label><input type="email" id="regEmail"></div>
                <div class="form-group"><label>用户名</label><input type="text" id="regUsername"></div>
                <div class="form-group"><label>真实姓名</label><input type="text" id="regRealName"></div>
                <div class="form-group"><label>设置密码</label><input type="password" id="regPassword"></div>
                <div class="form-group"><label>身份</label>
                    <select id="regRole" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
                        <option value="volunteer">志愿者</option>
                        <option value="teacher">老师</option>
                    </select>
                </div>
                <button class="hero-btn" id="doRegister" style="width:100%; margin-top:20px;">立即注册</button>
                <button class="btn-cancel" onclick="closeModal('registerModal')" style="width:100%; margin-top:10px; background:#eee; color:#333; border:none; padding:10px; border-radius:50px; cursor:pointer;">取消</button>
            </div>
        </div>
    </div>

    <!-- 3D模型查看器 (已修复缩放) -->
    <div class="model-viewer-modal" id="modelViewerModal">
        <div class="model-viewer-content">
            <div class="model-viewer-header"><h3>3D 模型查看器</h3><button id="modelViewerClose">✕</button></div>
            <div class="model-viewer-body">
                <model-viewer id="modelViewer" src="" auto-rotate camera-controls 
                    camera-orbit="45deg 75deg auto" 
                    min-camera-orbit="auto auto 0.05m" 
                    max-camera-orbit="auto auto 50m" 
                    field-of-view="auto" exposure="1.2">
                </model-viewer>
                <div style="padding:15px;">模型名称：<span id="modelName">-</span></div>
            </div>
        </div>
    </div>

    <footer><p>© 2026 微光循迹 · 用科技点亮大山的晨曦 </p></footer>

    <!-- 引入顺序：api -> auth -> script -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <script src="api.js?v=11"></script>
    <script src="auth.js?v=11"></script>
    <script src="script.js?v=11"></script>
</body>
</html>
