<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微光循迹 - 智慧支教生态系统</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #2d6a4f;
            --accent-orange: #ff9f1c;
            --soft-green: #d8f3dc;
            --text-main: #1b4332;
            --glass: rgba(255, 255, 255, 0.85);
            --bg-light: #f4f7f5;
            --danger-red: #991b1b;
            --card-shadow: 0 10px 30px rgba(45, 106, 79, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
        html { scroll-behavior: smooth; }
        body { background: var(--bg-light); color: var(--text-main); overflow-x: hidden; }

        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .firefly { position: absolute; width: 4px; height: 4px; background: var(--accent-orange); border-radius: 50%; filter: blur(2px); opacity: 0.3; animation: move 20s infinite linear; }
        @keyframes move { 0% { transform: translate(0, 0); opacity: 0; } 50% { opacity: 0.6; } 100% { transform: translate(100vw, 100vh); opacity: 0; } }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 8%; background: var(--glass); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(45, 106, 79, 0.05); }
        .brand { font-size: 1.5rem; font-weight: 800; color: var(--primary-green); letter-spacing: 1px; }
        .nav-links a { text-decoration: none; color: var(--text-main); margin-left: 2rem; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent-orange); }

        .hero-section { min-height: 85vh; padding: 100px 8%; display: flex; align-items: center; justify-content: center; text-align: center; background: linear-gradient(180deg, #fff7ed 0%, #ffffff 100%); }
        .hero-main-title { font-size: 3.8rem; font-weight: 900; color: #451a03; margin-bottom: 25px; line-height: 1.2; }
        .hero-main-title span { color: var(--primary-green); }
        .hero-subtitle { font-size: 1.5rem; font-weight: 500; color: #78350f; margin-bottom: 50px; opacity: 0.8; }
        .hero-btn { display: inline-block; padding: 1.1rem 3.5rem; border-radius: 50px; background: var(--primary-green); color: white; text-decoration: none; font-weight: 700; transition: 0.4s; cursor: pointer; border:none; }
        .hero-btn:hover { background: var(--accent-orange); transform: scale(1.05); }

        .container { max-width: 1300px; margin: 0 auto; padding: 80px 5%; }
        .reveal { opacity: 0; transform: translateY(30px); transition: 0.8s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .portal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2.5rem; }
        .portal-card { background: white; border-radius: 2.5rem; padding: 4rem 2rem; text-align: center; border: 1px solid rgba(45, 106, 79, 0.05); box-shadow: var(--card-shadow); transition: 0.4s; }
        .portal-card:hover { transform: translateY(-10px); border-color: var(--accent-orange); }

        .identity-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(5px); }
        .identity-modal.active { display: flex; }
        .modal-content { background: white; padding: 35px; border-radius: 25px; width: 90%; max-width: 450px; }
    </style>
</head>
<body>
    <div class="bg-glow"><div class="firefly" style="top: 15%; left: 8%;"></div></div>
    <nav>
        <div class="brand">微光循迹</div>
        <div class="nav-links">
            <a href="#">首页</a>
            <a href="#jobs">寻找岗位</a>
            <a href="#tools">3D教具库</a>
            <div id="guestNav">
                <button class="hero-btn" onclick="openModal('loginModal')" style="padding: 7px 20px; font-size: 0.9rem;">登录</button>
                <button class="hero-btn" onclick="openModal('registerModal')" style="padding: 7px 20px; font-size: 0.9rem; background:none; border:2px solid var(--primary-green); color:var(--primary-green); margin-left:10px;">注册</button>
            </div>
            <div id="userNav" style="display:none; align-items:center; gap:15px; margin-left:20px;">
                <a href="volunteer.html" style="margin:0; font-weight:bold;">个人工作台</a>
                <button onclick="handleLogout()" style="cursor:pointer; border:none; background:none; color:var(--danger-red);">退出</button>
            </div>
        </div>
    </nav>

    <section class="hero-section">
        <div class="hero-content">
            <h1 class="hero-main-title">用<span>科技</span>点亮<span>大山</span>的晨曦</h1>
            <p class="hero-subtitle">微光循迹：赋能乡村振兴的数字化志愿服务交互平台</p>
            <a href="#portals" class="hero-btn">开启支教之旅</a>
        </div>
    </section>

    <!-- 此处省略中间重复的 portals, stats, jobs, tools 部分，保持你最原始的代码即可 -->

    <!-- 登录注册弹窗 -->
    <div class="identity-modal" id="loginModal">
        <div class="modal-content">
            <h3>用户登录</h3><br>
            <input type="email" id="loginEmail" placeholder="邮箱" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:1px solid #ddd;">
            <input type="password" id="loginPassword" placeholder="密码" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:1px solid #ddd;">
            <button class="hero-btn" id="doLogin" style="width:100%;">登录</button>
            <button onclick="closeModal('loginModal')" style="width:100%; margin-top:10px; background:none; border:none; cursor:pointer;">取消</button>
        </div>
    </div>

    <!-- AI助手和3D查看器保持你之前最新的代码 -->

    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <script src="api.js?v=final"></script>
    <script src="auth.js?v=final"></script>
    <script src="script.js?v=final"></script>
</body>
</html>
