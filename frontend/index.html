<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>筑梦AI支教 - 智慧支教生态系统</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #2d6a4f;
            --accent-orange: #ff9f1c;
            --soft-green: #d8f3dc;
            --text-main: #1b4332;
            --glass: rgba(255, 255, 255, 0.85);
            --bg-light: #f4f7f5;
            --danger-red: #991b1b;
            --card-shadow: 0 10px 30px rgba(45, 106, 79, 0.08);
            --sunrise-gold: #fff7ed;
            --sunrise-amber: #ffedd5;
            --sunrise-text: #451a03;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
        html { scroll-behavior: smooth; }
        body { background: var(--bg-light); color: var(--text-main); overflow-x: hidden; line-height: 1.6; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .firefly { position: absolute; width: 4px; height: 4px; background: var(--accent-orange); border-radius: 50%; filter: blur(2px); opacity: 0.3; animation: move 20s infinite linear; }
        @keyframes move { 0% { transform: translate(0, 0); opacity: 0; } 50% { opacity: 0.6; } 100% { transform: translate(100vw, 100vh); opacity: 0; } }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 8%; background: var(--glass); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(45, 106, 79, 0.05); }
        .brand { font-size: 1.5rem; font-weight: 800; color: var(--primary-green); letter-spacing: 1px; }
        .nav-links a { text-decoration: none; color: var(--text-main); margin-left: 2rem; font-weight: 500; transition: 0.3s; }
        .hero-section { min-height: 85vh; padding: 100px 8%; display: flex; align-items: center; justify-content: center; text-align: center; position: relative; background: linear-gradient(180deg, var(--sunrise-gold) 0%, #ffffff 100%); overflow: hidden; }
        .hero-main-title { font-size: 3.8rem; font-weight: 900; color: var(--sunrise-text); margin-bottom: 25px; line-height: 1.2; }
        .hero-main-title span { color: var(--primary-green); }
        .hero-subtitle { font-size: 1.5rem; font-weight: 500; color: #78350f; margin-bottom: 50px; opacity: 0.8; }
        .hero-btn { display: inline-block; padding: 1.1rem 3.5rem; border-radius: 50px; background: var(--primary-green); color: white; text-decoration: none; font-weight: 700; transition: 0.4s; box-shadow: 0 15px 35px rgba(45, 106, 79, 0.2); }
        .container { max-width: 1300px; margin: 0 auto; padding: 100px 5%; }
        .portal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2.5rem; }
        .portal-card { background: white; border-radius: 2.5rem; padding: 4rem 2rem; text-align: center; transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1); border: 1px solid rgba(45, 106, 79, 0.05); box-shadow: var(--card-shadow); }
        .reveal { opacity: 0; transform: translateY(30px); transition: 0.8s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        /* 弹窗样式 */
        .identity-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(5px); }
        .identity-modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 25px; width: 90%; max-width: 500px; }
        model-viewer { width: 100%; height: 400px; background: #eee; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="bg-glow"><div class="firefly" style="top: 15%; left: 8%;"></div></div>
    <nav>
        <div class="brand">筑梦AI支教</div>
        <div class="nav-links">
            <a href="#">首页</a><a href="#jobs">寻找岗位</a><a href="#tools">3D教具库</a>
            <button onclick="openModal('loginModal')" style="cursor:pointer; background:none; border:2px solid var(--primary-green); padding:5px 15px; border-radius:8px; margin-left:2rem;">登录</button>
        </div>
    </nav>

    <section class="hero-section">
        <div class="hero-content">
            <h1 class="hero-main-title">用<span>科技</span>点亮<span>大山</span>的晨曦</h1>
            <p class="hero-subtitle">筑梦AI：跨越数字鸿沟，让每一个梦想在知识中绽放</p>
            <a href="#portals" class="hero-btn">开启支教之旅</a>
        </div>
    </section>

    <section id="portals" class="container">
        <div class="section-header reveal"><h2>谁在参与筑梦？</h2><div class="line"></div></div>
        <div class="portal-grid">
            <div class="portal-card reveal"><h3>志愿者入口</h3><p>记录您的公益里程。</p><a href="volunteer.html" class="hero-btn" style="padding:10px 20px; margin-top:20px;">进入</a></div>
            <div class="portal-card reveal"><h3>学校端</h3><p>发布教学需求。</p><a href="teacher.html" class="hero-btn" style="padding:10px 20px; margin-top:20px;">进入</a></div>
            <div class="portal-card reveal"><h3>学生端</h3><p>开启云端课堂。</p><a href="learning.html" class="hero-btn" style="padding:10px 20px; margin-top:20px;">进入</a></div>
        </div>
    </section>

    <section id="tools" class="container" style="background: var(--soft-green); border-radius: 3rem;">
        <div class="section-header reveal"><h2>数字化教具库</h2><div class="line"></div></div>
        <div class="portal-grid">
            <div class="portal-card reveal"><h3>斯特林发动机</h3><button class="hero-btn tool-btn" style="margin-top:20px; padding:10px;">3D 互动预览</button></div>
            <div class="portal-card reveal"><h3>平面四连杆机构</h3><button class="hero-btn tool-btn" style="margin-top:20px; padding:10px;">3D 互动预览</button></div>
            <div class="portal-card reveal"><h3>AI 巡检机器人</h3><button class="hero-btn tool-btn" style="margin-top:20px; padding:10px;">3D 互动预览</button></div>
        </div>
    </section>

    <!-- 3D 弹窗：这是你说“太大了”的那个设置 -->
    <div class="identity-modal" id="modelViewerModal">
        <div class="modal-content" style="max-width: 800px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <h3 id="modelName">3D 模型查看器</h3>
                <button onclick="closeModal('modelViewerModal')" style="border:none; background:none; font-size:1.5rem; cursor:pointer;">✕</button>
            </div>
            <model-viewer id="modelViewer" src="" auto-rotate camera-controls 
                camera-orbit="45deg 75deg 2.5m" 
                field-of-view="25deg" 
                exposure="1">
            </model-viewer>
            <div style="margin-top:15px; font-size:0.9rem; color:#666;">操作提示：鼠标拖拽旋转 | 滚轮缩放</div>
        </div>
    </div>

    <!-- AI 助手 -->
    <div id="aiAssistantBtn" onclick="openModal('aiAssistantWindow')" style="position:fixed; bottom:30px; right:30px; background:var(--primary-green); width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:999;"><i class="fas fa-comment-dots" style="color:white; font-size:1.5rem;"></i></div>
    <div class="identity-modal" id="aiAssistantWindow">
        <div class="modal-content" style="height:500px; display:flex; flex-direction:column; padding:0; overflow:hidden;">
            <div style="background:var(--primary-green); color:white; padding:20px; display:flex; justify-content:space-between;"><h3>AI助手</h3><button onclick="closeModal('aiAssistantWindow')" style="background:none; border:none; color:white; cursor:pointer;">✕</button></div>
            <div id="aiAssistantContent" style="flex:1; padding:20px; overflow-y:auto; background:#f9f9f9;"><div>你好！我是筑梦AI助理。</div></div>
            <div style="padding:15px; border-top:1px solid #eee; display:flex; gap:10px;"><input type="text" id="aiAssistantInput" style="flex:1; padding:10px; border-radius:10px; border:1px solid #ddd;" placeholder="问点什么..."><button id="aiAssistantSubmit" style="background:var(--primary-green); color:white; border:none; padding:10px; border-radius:10px; cursor:pointer;">发送</button></div>
        </div>
    </div>

    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <script src="api.js?v=orig"></script>
    <script src="script.js?v=fixed_3d"></script>
</body>
</html>
