<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微光循迹 - 智慧支教生态系统</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #2d6a4f;
            --accent-orange: #ff9f1c;
            --soft-green: #d8f3dc;
            --text-main: #1b4332;
            --glass: rgba(255, 255, 255, 0.85);
            --bg-light: #f4f7f5;
            --danger-red: #991b1b;
            --card-shadow: 0 10px 30px rgba(45, 106, 79, 0.08);
            --sunrise-gold: #fff7ed;
            --sunrise-amber: #ffedd5;
            --sunrise-text: #451a03;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
        html { scroll-behavior: smooth; }
        body { background: var(--bg-light); color: var(--text-main); overflow-x: hidden; line-height: 1.6; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .firefly { position: absolute; width: 4px; height: 4px; background: var(--accent-orange); border-radius: 50%; filter: blur(2px); opacity: 0.3; animation: move 20s infinite linear; }
        @keyframes move { 0% { transform: translate(0, 0); opacity: 0; } 50% { opacity: 0.6; } 100% { transform: translate(100vw, 100vh); opacity: 0; } }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 8%; background: var(--glass); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(45, 106, 79, 0.05); }
        .brand { font-size: 1.5rem; font-weight: 800; color: var(--primary-green); letter-spacing: 1px; }
        .nav-links a { text-decoration: none; color: var(--text-main); margin-left: 2rem; font-weight: 500; transition: 0.3s; }
        .hero-section { min-height: 85vh; padding: 100px 8%; display: flex; align-items: center; justify-content: center; text-align: center; position: relative; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" preserveAspectRatio="none"><path fill="%23ffedd5" fill-opacity="0.4" d="M0,224L60,202.7C120,181,240,139,360,138.7C480,139,600,181,720,208C840,235,960,245,1080,224C1200,203,1320,149,1380,122.7L1440,96L1440,320L1380,320C1320,320,1200,320,1080,320C960,320,840,320,720,320C600,320,480,320,360,320C240,320,120,320,60,320L0,320Z"></path></svg>'), linear-gradient(180deg, var(--sunrise-gold) 0%, #ffffff 100%); background-position: bottom; background-repeat: no-repeat; background-size: 100% 400px, 100% 100%; overflow: hidden; }
        .hero-main-title { font-size: 3.8rem; font-weight: 900; color: var(--sunrise-text); margin-bottom: 25px; line-height: 1.2; }
        .hero-main-title span { color: var(--primary-green); }
        .hero-subtitle { font-size: 1.5rem; font-weight: 500; color: #78350f; margin-bottom: 50px; opacity: 0.8; }
        .hero-btn { display: inline-block; padding: 1.1rem 3.5rem; border-radius: 50px; background: var(--primary-green); color: white; text-decoration: none; font-weight: 700; transition: 0.4s; box-shadow: 0 15px 35px rgba(45, 106, 79, 0.2); border: none; cursor: pointer; }
        .container { max-width: 1300px; margin: 0 auto; padding: 100px 5%; }
        .section-header { text-align: center; margin-bottom: 60px; }
        .section-header h2 { font-size: 2.4rem; color: var(--primary-green); font-weight: 800; }
        .section-header .line { width: 60px; height: 4px; background: var(--accent-orange); margin: 15px auto; border-radius: 2px; }
        .reveal { opacity: 0; transform: translateY(30px); transition: 0.8s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .portal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2.5rem; }
        .portal-card { background: white; border-radius: 2.5rem; padding: 4rem 2rem; text-align: center; transition: 0.5s; border: 1px solid rgba(45, 106, 79, 0.05); box-shadow: var(--card-shadow); }
        .portal-card:hover { transform: translateY(-15px); border-color: var(--accent-orange); }
        .model-viewer-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); z-index: 20000; justify-content: center; align-items: center; }
        .model-viewer-modal.active { display: flex; }
        .model-viewer-content { background: var(--glass); backdrop-filter: blur(20px); border-radius: 20px; width: 95%; max-width: 1200px; display: flex; flex-direction: column; overflow: hidden; }
        .model-viewer-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; background: linear-gradient(135deg, var(--soft-green) 0%, #fff 100%); }
        model-viewer { width: 100%; height: 60vh; display: block; }
        footer { text-align: center; padding: 5rem; background: var(--text-main); color: #88bd9e; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="bg-glow"><div class="firefly" style="top: 15%; left: 8%;"></div></div>
    <nav>
        <div class="brand">微光循迹</div>
        <div class="nav-links">
            <a href="#">首页</a><a href="#jobs">寻找岗位</a><a href="#tools">3D教具库</a>
            <button onclick="openModal('loginModal')" style="cursor:pointer; background:none; border:2px solid var(--primary-green); padding:5px 15px; border-radius:8px; margin-left:2rem;">登录</button>
        </div>
    </nav>

    <section class="hero-section">
        <div class="hero-content">
            <h1 class="hero-main-title">用<span>科技</span>点亮<span>大山</span>的晨曦</h1>
            <p class="hero-subtitle">微光循迹：赋能乡村振兴的数字化志愿服务交互平台</p>
            <a href="#portals" class="hero-btn">开启支教之旅</a>
        </div>
    </section>

    <section id="portals" class="container">
        <div class="section-header reveal"><h2>谁在参与微光？</h2><div class="line"></div></div>
        <div class="portal-grid">
            <div class="portal-card reveal"><i class="fas fa-heart fa-3x" style="color:var(--primary-green); margin-bottom:20px;"></i><h3>志愿者入口</h3><a href="volunteer.html" class="hero-btn" style="padding:10px 25px; margin-top:20px; font-size:1rem;">进入</a></div>
            <div class="portal-card reveal"><i class="fas fa-graduation-cap fa-3x" style="color:var(--primary-green); margin-bottom:20px;"></i><h3>学校 / 教师端</h3><a href="teacher.html" class="hero-btn" style="padding: 10px 25px; margin-top:20px; font-size:1rem;">进入</a></div>
            <div class="portal-card reveal"><i class="fas fa-book-open fa-3x" style="color:var(--primary-green); margin-bottom:20px;"></i><h3>学生学习端</h3><a href="learning.html" class="hero-btn" style="padding: 10px 25px; margin-top:20px; font-size:1rem;">进入</a></div>
        </div>
    </section>

    <!-- 关键：增加了 id="stats" 确保数字跳动能被触发 -->
    <section id="stats" class="container" style="background: linear-gradient(135deg, var(--soft-green) 0%, #fff 100%); border-radius: 3rem;">
        <div class="section-header reveal"><h2>成就数据</h2><div class="line"></div></div>
        <div class="portal-grid">
            <div class="reveal" style="text-align:center;"><div class="counter" style="font-size:3rem; font-weight:bold; color:var(--primary-green);" data-target="1520">0</div><p>志愿者参与</p></div>
            <div class="reveal" style="text-align:center;"><div class="counter" style="font-size:3rem; font-weight:bold; color:var(--primary-green);" data-target="86">0</div><p>合作学校</p></div>
            <div class="reveal" style="text-align:center;"><div class="counter" style="font-size:3rem; font-weight:bold; color:var(--primary-green);" data-target="12500">0</div><p>受益学生</p></div>
        </div>
    </section>

    <section id="tools" class="container" style="background: var(--soft-green); border-radius: 3rem;">
        <div class="section-header reveal"><h2>数字化教具库</h2><div class="line"></div></div>
        <div class="portal-grid" style="grid-template-columns: repeat(3, 1fr); gap: 20px;">
            <div class="portal-card reveal"><h3>斯特林发动机</h3><button class="hero-btn tool-btn" style="margin-top:20px; padding:10px;">3D预览</button></div>
            <div class="portal-card reveal"><h3>平面四连杆机构</h3><button class="hero-btn tool-btn" style="margin-top:20px; padding:10px;">3D预览</button></div>
            <div class="portal-card reveal"><h3>AI 巡检机器人</h3><button class="hero-btn tool-btn" style="margin-top:20px; padding:10px;">3D预览</button></div>
        </div>
    </section>

    <div class="identity-modal" id="loginModal">
        <div class="modal-content"><h3>用户登录</h3><br><input type="email" id="loginEmail" placeholder="邮箱" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:10px; margin-bottom:10px;"><input type="password" id="loginPassword" placeholder="密码" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:10px; margin-bottom:10px;"><button class="hero-btn" id="doLogin" style="width:100%;">登录</button><button onclick="closeModal('loginModal')" style="width:100%; margin-top:10px; border:none; background:none; cursor:pointer;">取消</button></div>
    </div>

    <div class="model-viewer-modal" id="modelViewerModal">
        <div class="model-viewer-content">
            <!-- 修复：红叉增加了直接的关闭指令 -->
            <div class="model-viewer-header"><h3>3D 模型查看器</h3><button onclick="closeModal('modelViewerModal')" style="background:none; border:none; font-size:2rem; cursor:pointer;">✕</button></div>
            <div class="model-viewer-body">
                <model-viewer id="modelViewer" src="" auto-rotate camera-controls camera-orbit="45deg 75deg auto" min-camera-orbit="auto auto 0.05m" max-camera-orbit="auto auto 50m" field-of-view="auto" exposure="1.2"></model-viewer>
                <div style="background:var(--sunrise-gold); padding:20px; border-top:2px solid var(--soft-green);">
                    <p>模型名称：<span id="modelName">-</span></p>
                    <p>操作提示：鼠标拖拽旋转 | 滚轮缩放 | 右键平移</p>
                </div>
            </div>
        </div>
    </div>

    <div id="aiAssistantBtn" onclick="openModal('aiAssistantWindow')" style="position:fixed; bottom:30px; right:30px; background:var(--primary-green); width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:999;"><i class="fas fa-comment-dots" style="color:white; font-size:1.5rem;"></i></div>
    <div class="model-viewer-modal" id="aiAssistantWindow">
        <div class="model-viewer-content" style="max-width:400px; height:500px;">
            <div class="model-viewer-header"><h3>AI 助手</h3><button onclick="closeModal('aiAssistantWindow')" style="background:none; border:none; cursor:pointer; font-size:1.5rem;">✕</button></div>
            <div id="aiAssistantContent" style="flex:1; padding:20px; overflow-y:auto; background:#f9f9f9; text-align:left;"><div>你好！我是微光AI。</div></div>
            <div style="padding:15px; border-top:1px solid #eee; display:flex; gap:10px;"><input type="text" id="aiAssistantInput" style="flex:1; padding:10px; border:1px solid #ddd; border-radius:10px;" placeholder="问点什么..."><button id="aiAssistantSubmit" style="background:var(--primary-green); color:white; border:none; padding:10px; border-radius:10px; cursor:pointer;">发送</button></div>
        </div>
    </div>

    <footer><p>© 2026 微光循迹 · 用科技点亮大山的晨曦 </p></footer>

    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <script src="api.js?v=final"></script>
    <script src="script.js?v=final105"></script>
</body>
</html>
