<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>志愿者工作台 - 微光循迹</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="brand">微光循迹</div>
        <div class="nav-links">
            <a href="index.html">返回首页</a>
            <button onclick="handleLogout()" style="margin-left:20px; border:none; background:none; color:red; cursor:pointer;">退出登录</button>
        </div>
    </nav>

    <div class="container">
        <!-- 还原图2的欢迎横幅 -->
        <div class="welcome-banner" style="background: linear-gradient(135deg, #d8f3dc 0%, #f0fdf4 100%); padding: 50px; border-radius: 30px; margin-bottom: 30px;">
            <h2 id="helloUser" style="font-size: 2.5rem; margin-bottom: 10px;">欢迎回来，志愿者伙伴！</h2>
            <p>您已点亮 1 枚勋章，还有新的漂流瓶等待认领。</p>
        </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 30px;">
            <!-- 左侧：招募和漂流瓶 -->
            <div>
                <div class="glass-card" style="background:white; padding:30px; border-radius:20px; margin-bottom:30px; box-shadow:0 10px 30px rgba(0,0,0,0.05);">
                    <h3>最新支教招募</h3><br>
                    <p>【紧急】凉山美姑县小学支教 (03-22)</p>
                    <p>【正在招募】怒江中心小学数学科普 (03-21)</p>
                </div>

                <div class="glass-card" style="background:white; padding:30px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.05);">
                    <h3>萤火虫互助 - 认领虚拟漂流瓶</h3><br>
                    <table style="width:100%;">
                        <tr><td>学习难题</td><td>斯特林发动机怎么组装？</td><td><button class="hero-btn" style="padding:5px 15px;">认领</button></td></tr>
                    </table>
                </div>
            </div>

            <!-- 右侧：勋章和进度 -->
            <div>
                <div class="glass-card" style="background:white; padding:30px; border-radius:20px; margin-bottom:30px; text-align:center;">
                    <h3>我的萤火虫勋章</h3>
                    <div style="font-size:3rem; margin:20px 0;">🥉</div>
                    <p>已点亮 1 枚数字勋章</p>
                </div>

                <div class="glass-card" style="background:white; padding:30px; border-radius:20px;">
                    <h3>我的申请进度</h3><br>
                    <p>✅ 提交申请</p>
                    <p>⏳ AI 审核中 (DeepSeek)</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (user) document.getElementById('helloUser').innerText = `欢迎回来，${user.username}！`;
        }
        function handleLogout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
