<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>志愿者中心 - 微光循迹</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 这里加入侧边栏专用样式 -->
    <style>
        body { display: flex; min-height: 100vh; background: #f0f2f5; }
        
        /* 侧边栏样式 */
        .sidebar {
            width: 260px; background: white; border-right: 1px solid #e5e7eb;
            display: flex; flex-direction: column; position: fixed; height: 100vh;
        }
        .sidebar-header { padding: 30px 20px; font-size: 1.5rem; font-weight: bold; color: var(--primary-green); border-bottom: 1px solid #f3f4f6; }
        .sidebar-menu { flex: 1; padding: 20px 0; }
        .menu-item {
            padding: 15px 25px; display: flex; align-items: center; cursor: pointer;
            color: #4b5563; transition: 0.3s; font-weight: 500;
        }
        .menu-item i { margin-right: 12px; width: 20px; text-align: center; }
        .menu-item:hover, .menu-item.active { background: #ecfdf5; color: var(--primary-green); border-right: 4px solid var(--primary-green); }
        .menu-item.logout { margin-top: auto; color: #ef4444; }

        /* 右侧内容区 */
        .main-content { margin-left: 260px; flex: 1; padding: 40px; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }

        /* 信息填写表单卡片 */
        .form-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 25px; display: flex; align-items: center; }
        .form-group label { width: 120px; color: #374151; font-weight: 500; }
        .form-group input, .form-group select { 
            flex: 1; padding: 10px 15px; border: 1px solid #d1d5db; border-radius: 8px; outline: none; 
        }
        .form-group input:disabled { background: #f9fafb; cursor: not-allowed; }
        
        /* 图片上传预览 */
        .photo-upload { display: flex; align-items: center; gap: 20px; }
        .preview-box { width: 100px; height: 120px; background: #f3f4f6; border: 2px dashed #d1d5db; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }

        /* 绿色按钮组 */
        .btn-group { margin-top: 30px; display: flex; gap: 15px; }
        .btn-save { background: #10b981; color: white; padding: 10px 30px; border-radius: 8px; border: none; cursor: pointer; }
        .btn-edit { background: white; color: #10b981; border: 1px solid #10b981; padding: 10px 30px; border-radius: 8px; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- 侧边导航栏 -->
    <div class="sidebar">
        <div class="sidebar-header">志愿者中心</div>
        <div class="sidebar-menu">
            <div class="menu-item" onclick="window.location.href='index.html'">
                <i class="fas fa-home"></i> 微光循迹官网
            </div>
            <div class="menu-item active" onclick="switchTab('dashboard')">
                <i class="fas fa-tachometer-alt"></i> 工作台首页
            </div>
            <div class="menu-item" onclick="switchTab('profile')">
                <i class="fas fa-user-edit"></i> 信息填写
            </div>
            <div class="menu-item" onclick="switchTab('security')">
                <i class="fas fa-shield-alt"></i> 账号安全
            </div>
            <div class="menu-item logout" onclick="handleLogout()">
                <i class="fas fa-sign-out-alt"></i> 退出账号
            </div>
        </div>
    </div>

    <div class="main-content">
        
        <!-- Tab 1: 工作台首页 (保留你原来的图2/3内容) -->
        <div id="dashboard" class="tab-content active">
            <!-- 这里直接放入你原来 volunteer.html 里的 <section> 内容 -->
            <div class="welcome-banner" style="background: #d8f3dc; padding: 40px; border-radius: 20px; margin-bottom: 30px;">
                <h2 id="welcomeName">欢迎回来，志愿者伙伴！</h2>
                <p>您已点亮 1 枚勋章，还有新的漂流瓶等待认领。</p>
            </div>
            <!-- ... 原有的图2图3的其他列表、勋章内容放在这里 ... -->
        </div>

        <!-- Tab 2: 信息填写 (类似图1/4) -->
        <div id="profile" class="tab-content">
            <div class="form-card">
                <h3>个人详细资料</h3>
                <hr style="margin: 20px 0; opacity: 0.1;">
                
                <!-- 自动录入项 (不可编辑) -->
                <div class="form-group">
                    <label>用户名：</label>
                    <input type="text" id="view-username" disabled>
                </div>
                <div class="form-group">
                    <label>邮箱地址：</label>
                    <input type="text" id="view-email" disabled>
                </div>
                <div class="form-group">
                    <label>真实姓名：</label>
                    <input type="text" id="view-realname" disabled>
                </div>
                <div class="form-group">
                    <label>身份：</label>
                    <input type="text" value="志愿者" disabled>
                </div>

                <!-- 需填入项 -->
                <form id="profileForm">
                    <div class="form-group">
                        <label>就读学校：</label>
                        <input type="text" id="school" placeholder="请输入学校名称">
                    </div>
                    <div class="form-group">
                        <label>专业类别：</label>
                        <input type="text" id="major" placeholder="如：工学 / 人工智能">
                    </div>
                    <div class="form-group">
                        <label>学历：</label>
                        <select id="education">
                            <option value="本科">本科</option>
                            <option value="硕士">硕士</option>
                            <option value="博士">博士</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>手机号码：</label>
                        <input type="tel" id="phone" placeholder="请输入11位手机号">
                    </div>
                    <div class="form-group">
                        <label>学号：</label>
                        <input type="text" id="studentId" placeholder="请输入您的学号">
                    </div>
                    <div class="form-group">
                        <label>志愿者照片：</label>
                        <div class="photo-upload">
                            <div class="preview-box" id="imagePreview">
                                <span style="color: #9ca3af; font-size: 0.8rem;">暂无照片</span>
                            </div>
                            <input type="file" id="photoInput" accept="image/*" style="display: none;">
                            <button type="button" class="btn-edit" onclick="document.getElementById('photoInput').click()">选择文件</button>
                        </div>
                    </div>

                    <div class="btn-group">
                        <button type="button" class="btn-save" onclick="saveProfile()">保存信息</button>
                        <button type="button" class="btn-edit" onclick="enableEditing()">编辑模式</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Tab 3: 账号安全 (图5) -->
        <div id="security" class="tab-content">
            <div class="form-card" style="max-width: 500px;">
                <h3>修改密码</h3>
                <p style="color: #6b7280; font-size: 0.9rem; margin-bottom: 25px;">为了您的账号安全，请定期更换密码</p>
                <div class="form-group" style="flex-direction: column; align-items: flex-start;">
                    <label style="width: 100%; margin-bottom: 8px;">* 旧密码：</label>
                    <input type="password" id="oldPassword" style="width: 100%;">
                </div>
                <div class="form-group" style="flex-direction: column; align-items: flex-start;">
                    <label style="width: 100%; margin-bottom: 8px;">* 新密码：</label>
                    <input type="password" id="newPassword" style="width: 100%;">
                </div>
                <div class="form-group" style="flex-direction: column; align-items: flex-start;">
                    <label style="width: 100%; margin-bottom: 8px;">* 确认新密码：</label>
                    <input type="password" id="confirmPassword" style="width: 100%;">
                </div>
                <button class="btn-save" style="width: 100%;" onclick="updatePassword()">确定修改</button>
            </div>
        </div>

    </div>

    <!-- 引入之前定义好的工具 -->
    <script src="api.js?v=5"></script>
    <script src="auth.js"></script>
    <script>
        // 初始化：获取并填入已注册的信息
        window.addEventListener('load', async () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                window.location.href = 'index.html'; // 未登录强制跳转
                return;
            }

            // 填入基础信息（图1中的录入项）
            document.getElementById('view-username').value = user.username || '未设置';
            document.getElementById('view-email').value = user.email || '未设置';
            document.getElementById('view-realname').value = user.realName || user.username;
            document.getElementById('welcomeName').innerText = `欢迎回来，${user.username}！`;

            // 如果localStorage有补充信息，也一并填入
            const savedInfo = JSON.parse(localStorage.getItem('volunteer_profile_' + user.email));
            if (savedInfo) {
                document.getElementById('school').value = savedInfo.school || '';
                document.getElementById('major').value = savedInfo.major || '';
                document.getElementById('phone').value = savedInfo.phone || '';
                document.getElementById('studentId').value = savedInfo.studentId || '';
                if (savedInfo.photo) {
                    document.getElementById('imagePreview').innerHTML = `<img src="${savedInfo.photo}">`;
                }
            }
        });

        // 切换选项卡逻辑
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // 图片预览处理
        document.getElementById('photoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('imagePreview').innerHTML = `<img src="${event.target.result}">`;
                    // 临时存入session以便保存
                    window.currentPhotoBase64 = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // 保存信息
        function saveProfile() {
            const user = JSON.parse(localStorage.getItem('user'));
            const profileData = {
                school: document.getElementById('school').value,
                major: document.getElementById('major').value,
                education: document.getElementById('education').value,
                phone: document.getElementById('phone').value,
                studentId: document.getElementById('studentId').value,
                photo: window.currentPhotoBase64 || ""
            };
            localStorage.setItem('volunteer_profile_' + user.email, JSON.stringify(profileData));
            alert('✅ 个人资料保存成功！');
        }

        // 退出登录
        function handleLogout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        // 修改密码
        function updatePassword() {
            const newP = document.getElementById('newPassword').value;
            const conP = document.getElementById('confirmPassword').value;
            if (newP !== conP) {
                alert('❌ 两次输入的新密码不一致');
                return;
            }
            alert('✅ 密码修改指令已发送至服务器（当前为演示环境）');
        }
    </script>
</body>
</html>
