<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>志愿者中心 - 微光循迹</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #2d6a4f;
            --accent-orange: #ff9f1c;
            --soft-green: #d8f3dc;
            --text-main: #1b4332;
            --bg-light: #f8fafc;
            --danger-red: #991b1b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", sans-serif; }
        body { display: flex; min-height: 100vh; background: var(--bg-light); color: var(--text-main); overflow-x: hidden; }

        /* --- 侧边栏 --- */
        .sidebar {
            width: 260px; background: white; border-right: 1px solid #e2e8f0;
            position: fixed; height: 100vh; display: flex; flex-direction: column; z-index: 1000;
        }
        .sidebar-header { padding: 30px 20px; font-size: 1.4rem; font-weight: bold; color: var(--primary-green); border-bottom: 1px solid #f1f5f9; }
        .sidebar-menu { flex: 1; padding: 15px 0; }
        .menu-item {
            padding: 15px 25px; color: #64748b; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; text-decoration: none; font-weight: 500;
        }
        .menu-item i { margin-right: 12px; width: 20px; font-size: 1.1rem; }
        .menu-item:hover, .menu-item.active { background: #f0fdf4; color: var(--primary-green); border-right: 4px solid var(--primary-green); }
        .menu-item.logout { margin-top: auto; color: #ef4444; margin-bottom: 20px; }

        /* --- 主内容区 --- */
        .main-content { margin-left: 260px; flex: 1; padding: 40px; position: relative; }
        .tab-panel { display: none; width: 100%; }
        .tab-panel.active { display: block; }

        /* --- 原本的动态效果样式 --- */
        .reveal { position: relative; transform: translateY(30px); opacity: 0; transition: 0.8s all ease; }
        .reveal.active { transform: translateY(0); opacity: 1; }

        .glass-card {
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(45, 106, 79, 0.05);
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.5); transition: 0.4s;
        }
        .glass-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(45, 106, 79, 0.1); }

        /* 欢迎 Banner 动画 */
        .welcome-banner {
            background: linear-gradient(135deg, #d8f3dc 0%, #f0fdf4 100%);
            padding: 45px; border-radius: 25px; margin-bottom: 30px;
            animation: slideIn 0.8s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        /* 统计数字跳动 */
        .counter { font-size: 2.5rem; font-weight: 800; color: var(--primary-green); }

        /* 漂流瓶表格与按钮 */
        .bottle-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .bottle-table td { padding: 15px 12px; border-bottom: 1px solid #f1f5f9; }
        .btn-reply { background: var(--accent-orange); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-reply:hover { transform: scale(1.1); box-shadow: 0 5px 15px rgba(255, 159, 28, 0.3); }

        /* 鼠标光晕 */
        .cursor-glow {
            position: fixed; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(45, 106, 79, 0.05) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 1; transform: translate(-50%, -50%);
        }

        /* 响应式 */
        .dashboard-grid { display: grid; grid-template-columns: 1.8fr 1fr; gap: 30px; }
        @media (max-width: 1100px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- 侧边导航 -->
    <div class="sidebar">
        <div class="sidebar-header">微光循迹</div>
        <div class="sidebar-menu">
            <a href="index.html" class="menu-item"><i class="fas fa-home"></i> 官网首页</a>
            <div class="menu-item active" onclick="showTab('tab-home', this)"><i class="fas fa-tachometer-alt"></i> 工作台首页</div>
            <div class="menu-item" onclick="showTab('tab-info', this)"><i class="fas fa-user-circle"></i> 信息填写</div>
            <div class="menu-item" onclick="showTab('tab-safe', this)"><i class="fas fa-shield-alt"></i> 账号安全</div>
            <div class="menu-item logout" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> 退出账号</div>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
        
        <!-- Tab 1: 动态工作台 -->
        <div id="tab-home" class="tab-panel active">
            <div class="welcome-banner">
                <h2 id="welcomeText">欢迎回来，伙伴！</h2>
                <p>微光循迹：赋能乡村振兴的数字化志愿服务交互平台</p>
            </div>

            <div class="dashboard-grid">
                <div class="col-left">
                    <div class="glass-card reveal">
                        <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
                            <i class="fas fa-bullhorn" style="color:var(--primary-green)"></i>
                            <h3>最新支教招募</h3>
                        </div>
                        <div class="recruitment-list">
                            <div style="padding:15px; border-bottom:1px solid #f1f5f9;">
                                <strong>【紧急】凉山美姑县小学支教</strong>
                                <p style="font-size:0.8rem; color:#888;">专业对标：艺术/教育类</p>
                            </div>
                            <div style="padding:15px;">
                                <strong>【热招】贵州大山镇机械科普</strong>
                                <p style="font-size:0.8rem; color:#888;">专业对标：理工/人工智能类</p>
                            </div>
                        </div>
                    </div>

                    <div class="glass-card reveal">
                        <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
                            <i class="fas fa-comment-medical" style="color:var(--primary-green)"></i>
                            <h3>萤火虫互助 - 认领漂流瓶</h3>
                        </div>
                        <table class="bottle-table">
                            <tr><td><span style="background:#fef9c3;color:#ca8a04;padding:2px 8px;border-radius:5px;">学习</span></td><td>老师，斯特林发动机怎么组装？</td><td><button class="btn-reply">认领</button></td></tr>
                            <tr><td><span style="background:#fdf2f8;color:#db2777;padding:2px 8px;border-radius:5px;">心情</span></td><td>我想知道外面的世界...</td><td><button class="btn-reply">认领</button></td></tr>
                        </table>
                    </div>
                </div>

                <div class="col-right">
                    <div class="glass-card reveal" style="text-align:center;">
                        <h3>我的勋章</h3>
                        <div style="font-size:3rem; margin:15px 0;">🥉</div>
                        <div class="counter" data-target="1">0</div>
                        <p style="color:#888;">已点亮数字勋章</p>
                    </div>

                    <div class="glass-card reveal">
                        <h3>申请进度</h3>
                        <div style="margin-top:15px; border-left:2px dashed #ddd; padding-left:20px; position:relative;">
                            <div style="margin-bottom:20px;"><i class="fas fa-check-circle" style="color:var(--primary-green); position:absolute; left:-9px;"></i> 提交申请</div>
                            <div style="color:var(--primary-green); font-weight:bold;"><i class="fas fa-sync-alt fa-spin" style="position:absolute; left:-9px;"></i> AI 审核中...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab 2: 信息填写 -->
        <div id="tab-info" class="tab-panel">
            <div class="glass-card reveal">
                <h2 style="margin-bottom:25px;">个人档案中心</h2>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                    <div><label>用户名</label><input type="text" id="prof-user" style="width:100%; padding:10px; margin-top:5px; border-radius:8px; border:1px solid #ddd;" disabled></div>
                    <div><label>电子邮箱</label><input type="text" id="prof-mail" style="width:100%; padding:10px; margin-top:5px; border-radius:8px; border:1px solid #ddd;" disabled></div>
                </div>
                <div style="margin-top:20px;"><label>真实姓名</label><input type="text" id="prof-name" style="width:100%; padding:10px; margin-top:5px; border-radius:8px; border:1px solid #ddd;" disabled></div>
                
                <hr style="margin:30px 0; opacity:0.1;">
                
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                    <div><label>就读学校</label><input type="text" placeholder="请输入学校" style="width:100%; padding:10px; margin-top:5px; border-radius:8px; border:1px solid #ddd;"></div>
                    <div><label>专业</label><input type="text" placeholder="请输入专业" style="width:100%; padding:10px; margin-top:5px; border-radius:8px; border:1px solid #ddd;"></div>
                </div>
                <div style="margin-top:20px;"><label>照片上传</label><br>
                    <input type="file" id="fileInp" hidden>
                    <button class="btn-reply" style="background:var(--primary-green); margin-top:10px;" onclick="document.getElementById('fileInp').click()">访问电脑文件</button>
                </div>
                <div style="margin-top:30px; display:flex; gap:10px;">
                    <button class="btn-reply" style="background:#10b981; padding:12px 30px;">保存信息</button>
                    <button class="btn-reply" style="background:white; color:#10b981; border:1px solid #10b981; padding:12px 30px;">进入编辑</button>
                </div>
            </div>
        </div>

        <!-- Tab 3: 账号安全 -->
        <div id="tab-safe" class="tab-panel">
            <div class="glass-card reveal" style="max-width:500px;">
                <h2 style="margin-bottom:20px;">修改登录密码</h2>
                <div style="margin-bottom:15px;"><label>* 旧密码</label><input type="password" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;"></div>
                <div style="margin-bottom:15px;"><label>* 新密码</label><input type="password" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;"></div>
                <div style="margin-bottom:25px;"><label>* 确认新密码</label><input type="password" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;"></div>
                <button class="btn-reply" style="width:100%; padding:12px; background:var(--primary-green);">确定修改</button>
            </div>
        </div>

    </div>

    <!-- 脚本引用 -->
    <script src="api.js?v=20"></script>
    <script>
        // 1. 鼠标跟随光晕效果
        const glow = document.getElementById('cursorGlow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        // 2. 滚动揭幕逻辑 (Reveal)
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                if (elementTop < windowHeight - 100) {
                    reveals[i].classList.add("active");
                }
            }
        }
        window.addEventListener("scroll", reveal);

        // 3. 数字计数动画
        function animateCounters() {
            const counters = document.querySelectorAll('.counter');
            counters.forEach(c => {
                const target = +c.dataset.target;
                const step = target / 50;
                let current = 0;
                const update = () => {
                    current += step;
                    if (current < target) {
                        c.innerText = Math.ceil(current);
                        setTimeout(update, 20);
                    } else {
                        c.innerText = target;
                    }
                };
                update();
            });
        }

        // 4. 标签切换与初始化
        function showTab(tabId, el) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
            reveal(); // 切换时重新触发揭幕
            if(tabId === 'tab-home') animateCounters();
        }

        window.onload = function() {
            const user = JSON.parse(localStorage.getItem('user'));
            if(user) {
                document.getElementById('welcomeText').innerText = `欢迎回来，${user.username}！`;
                document.getElementById('prof-user').value = user.username;
                document.getElementById('prof-mail').value = user.email;
                document.getElementById('prof-name').value = user.real_name || user.username;
            }
            reveal();
            animateCounters();
        };

        function handleLogout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
