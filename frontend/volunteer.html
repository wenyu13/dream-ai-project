<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>志愿者中心 - 微光循迹</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { display: flex; min-height: 100vh; background: #f8fafc; }
        
        /* 侧边栏 */
        .sidebar { width: 260px; background: white; border-right: 1px solid #e2e8f0; position: fixed; height: 100vh; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 20px; font-size: 1.4rem; font-weight: bold; color: #2d6a4f; border-bottom: 1px solid #f1f5f9; }
        .menu-item { padding: 15px 25px; color: #64748b; cursor: pointer; transition: 0.3s; display: flex; align-items: center; }
        .menu-item i { margin-right: 12px; width: 20px; }
        .menu-item:hover, .menu-item.active { background: #f0fdf4; color: #2d6a4f; border-right: 4px solid #2d6a4f; }
        .menu-item.logout { margin-top: auto; color: #ef4444; margin-bottom: 20px; }

        /* 内容区 */
        .main-content { margin-left: 260px; flex: 1; padding: 40px; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: fadeIn 0.4s ease; }

        /* 表单样式 */
        .info-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .form-row { display: flex; align-items: center; margin-bottom: 20px; }
        .form-row label { width: 100px; color: #475569; font-weight: 500; }
        .form-row input, .form-row select { flex: 1; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; }
        .form-row input:disabled { background: #f8fafc; color: #94a3b8; }

        /* 图片上传 */
        .photo-area { display: flex; align-items: center; gap: 20px; }
        .photo-preview { width: 100px; height: 130px; background: #f1f5f9; border-radius: 8px; overflow: hidden; border: 2px dashed #cbd5e1; }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; }

        .btn-green { background: #10b981; color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; }
        .btn-outline { border: 1px solid #10b981; color: #10b981; background: white; padding: 10px 25px; border-radius: 8px; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">志愿者中心</div>
        <div class="menu-item" onclick="window.location.href='index.html'"><i class="fas fa-home"></i> 微光循迹官网</div>
        <div class="menu-item active" onclick="showTab('tab-home')"><i class="fas fa-th-large"></i> 工作台首页</div>
        <div class="menu-item" onclick="showTab('tab-info')"><i class="fas fa-user-edit"></i> 信息填写</div>
        <div class="menu-item" onclick="showTab('tab-safe')"><i class="fas fa-lock"></i> 账号安全</div>
        <div class="menu-item logout" onclick="handleLogout()"><i class="fas fa-power-off"></i> 退出账号</div>
    </div>

    <div class="main-content">
        <!-- 首页工作台 (原来的图2/3内容) -->
        <div id="tab-home" class="tab-panel active">
            <div style="background: #d8f3dc; padding: 40px; border-radius: 20px;">
                <h2 id="userNameDisplay">欢迎回来，伙伴！</h2>
                <p>愿微光汇聚成炬，照亮大山的孩子。</p>
            </div>
            <!-- 这里可以放你原来的任务列表、进度条等 -->
        </div>

        <!-- 信息填写 (图1/4) -->
        <div id="tab-info" class="tab-panel">
            <div class="info-card">
                <h3>个人档案详情</h3><br>
                <div class="form-row"><label>用户名</label><input type="text" id="prof-username" disabled></div>
                <div class="form-row"><label>电子邮箱</label><input type="text" id="prof-email" disabled></div>
                <div class="form-row"><label>真实姓名</label><input type="text" id="prof-realname" disabled></div>
                <div class="form-row"><label>身份</label><input type="text" value="志愿者" disabled></div>
                
                <hr style="margin: 20px 0; border: none; border-top: 1px solid #f1f5f9;">

                <div class="form-row"><label>就读学校</label><input type="text" id="school" placeholder="请输入学校"></div>
                <div class="form-row"><label>专业名称</label><input type="text" id="major" placeholder="请输入专业"></div>
                <div class="form-row"><label>最高学历</label>
                    <select id="edu"><option>本科</option><option>硕士</option><option>博士</option></select>
                </div>
                <div class="form-row"><label>联系手机</label><input type="text" id="phone"></div>
                <div class="form-row"><label>学号</label><input type="text" id="stuId"></div>
                
                <div class="form-row"><label>个人照片</label>
                    <div class="photo-area">
                        <div class="photo-preview" id="photoPreview"></div>
                        <input type="file" id="photoFile" hidden accept="image/*">
                        <button class="btn-outline" onclick="document.getElementById('photoFile').click()">选择图片</button>
                    </div>
                </div>

                <div style="margin-top: 30px; display: flex; gap: 10px;">
                    <button class="btn-green" onclick="alert('已保存到本地存储')">保存信息</button>
                    <button class="btn-outline">编辑</button>
                </div>
            </div>
        </div>

        <!-- 账号安全 (图5) -->
        <div id="tab-safe" class="tab-panel">
            <div class="info-card" style="max-width: 400px;">
                <h3>修改账户密码</h3><br>
                <div class="form-row" style="flex-direction: column; align-items: flex-start;">
                    <label>* 旧密码</label><input type="password" style="width: 100%;">
                </div>
                <div class="form-row" style="flex-direction: column; align-items: flex-start;">
                    <label>* 新密码</label><input type="password" style="width: 100%;">
                </div>
                <div class="form-row" style="flex-direction: column; align-items: flex-start;">
                    <label>* 确认新密码</label><input type="password" style="width: 100%;">
                </div>
                <button class="btn-green" style="width: 100%;">确认修改</button>
            </div>
        </div>
    </div>

    <script src="api.js?v=5"></script>
    <script src="auth.js"></script>
    <script>
        // 页面启动逻辑
        window.onload = function() {
            const userStr = localStorage.getItem('user');
            if (!userStr) {
                // 如果未登录，跳转回首页
                // window.location.href = 'index.html'; 
                return;
            }
            const user = JSON.parse(userStr);
            
            // 自动填充注册信息
            document.getElementById('userNameDisplay').innerText = `欢迎回来，${user.username}！`;
            document.getElementById('prof-username').value = user.username;
            document.getElementById('prof-email').value = user.email;
            document.getElementById('prof-realname').value = user.real_name || user.username;
        };

        // 切换标签
        function showTab(id) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // 图片预览
        document.getElementById('photoFile').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                document.getElementById('photoPreview').innerHTML = `<img src="${event.target.result}">`;
            };
            reader.readAsDataURL(e.target.files[0]);
        };
    </script>
</body>
</html>
