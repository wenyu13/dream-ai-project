<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>志愿者工作台 - 微光循迹</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background:#f4f7f5; color:#1b4332; font-family: sans-serif;">
    <nav style="background:white; padding:1rem 8%; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 15px rgba(0,0,0,0.05);">
        <div style="font-size:1.5rem; font-weight:800; color:#2d6a4f;">微光循迹</div>
        <div style="display:flex; gap:20px; align-items:center;">
            <a href="index.html" style="text-decoration:none; color:#333; font-weight:bold;">返回官网</a>
            <button onclick="localStorage.clear(); location.href='index.html';" style="color:red; background:none; border:none; cursor:pointer;">退出登录</button>
        </div>
    </nav>

    <div style="max-width:1200px; margin:40px auto; padding:0 20px;">
        <!-- 欢迎横幅 -->
        <div style="background: linear-gradient(135deg, #d8f3dc 0%, #f0fdf4 100%); padding: 50px; border-radius: 30px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(45, 106, 79, 0.05); border: 1px solid white;">
            <h2 id="userName" style="font-size:2.5rem; margin-bottom:10px;">欢迎回来，志愿者伙伴！</h2>
            <p>您已点亮 <span style="color:#ff9f1c; font-weight:bold;">1</span> 枚勋章，还有新的漂流瓶等待认领。</p>
        </div>

        <div style="display: grid; grid-template-columns: 1.8fr 1fr; gap: 30px;">
            <!-- 左侧内容 -->
            <div>
                <div style="background:white; padding:30px; border-radius:25px; margin-bottom:30px; box-shadow:0 5px 20px rgba(0,0,0,0.02);">
                    <h3 style="color:#2d6a4f; margin-bottom:20px;"><i class="fas fa-bullhorn"></i> 最新支教招募</h3>
                    <div style="padding:15px; border-left:4px solid #ef4444; background:#fff1f2; margin-bottom:15px; border-radius:0 10px 10px 0;">
                        <strong>【紧急】凉山美姑县小学支教 (2人)</strong>
                        <p style="font-size:0.8rem; color:#888;">03-22 发布</p>
                    </div>
                    <div style="padding:15px; border-left:4px solid #22c55e; background:#f0fdf4; border-radius:0 10px 10px 0;">
                        <strong>【正在招募】大山镇希望小学机械科普</strong>
                        <p style="font-size:0.8rem; color:#888;">03-20 发布</p>
                    </div>
                </div>

                <div style="background:white; padding:30px; border-radius:25px; box-shadow:0 5px 20px rgba(0,0,0,0.02);">
                    <h3 style="color:#2d6a4f; margin-bottom:20px;"><i class="fas fa-heart"></i> 认领漂流瓶</h3>
                    <table style="width:100%; border-collapse:collapse;">
                        <tr style="border-bottom:1px solid #f1f5f9;">
                            <td style="padding:15px 0;">“老师，那个斯特林发动机怎么组装？”</td>
                            <td style="text-align:right;"><button style="background:#ff9f1c; color:white; border:none; padding:8px 20px; border-radius:10px; cursor:pointer; font-weight:bold;">认领回复</button></td>
                        </tr>
                    </table>
                </div>
            </div>

            <!-- 右侧 -->
            <div>
                <div style="background:white; padding:30px; border-radius:25px; text-align:center; margin-bottom:30px; box-shadow:0 5px 20px rgba(0,0,0,0.02);">
                    <h3 style="color:#2d6a4f;">我的萤火虫勋章</h3>
                    <div style="font-size:4rem; margin:20px 0;">🥉</div>
                    <p style="color:#888;">已点亮 1 枚数字勋章</p>
                </div>

                <div style="background:white; padding:30px; border-radius:25px; box-shadow:0 5px 20px rgba(0,0,0,0.02);">
                    <h3 style="color:#2d6a4f; margin-bottom:20px;">我的申请进度</h3>
                    <div style="border-left:2px solid #e2e8f0; margin-left:15px; padding-left:25px;">
                        <div style="margin-bottom:25px; position:relative;"><i class="fas fa-check-circle" style="position:absolute; left:-34px; color:#2d6a4f; background:white;"></i> 提交申请</div>
                        <div style="color:#2d6a4f; font-weight:bold; position:relative;"><i class="fas fa-sync fa-spin" style="position:absolute; left:-34px; background:white;"></i> AI 智能审核中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (user) document.getElementById('userName').innerText = `欢迎回来，${user.username}！`;
        };
    </script>
</body>
</html>
