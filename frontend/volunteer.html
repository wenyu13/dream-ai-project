<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>志愿者中心 - 微光循迹</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #2d6a4f;
            --accent-orange: #ff9f1c;
            --soft-green: #d8f3dc;
            --text-main: #1b4332;
            --glass: rgba(255, 255, 255, 0.85);
            --bg-light: #f4f7f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", sans-serif; }
        
        body { 
            display: flex; 
            min-height: 100vh; 
            background: var(--bg-light); 
            color: var(--text-main); 
            overflow-x: hidden;
            background-image: radial-gradient(circle at 0% 0%, rgba(45, 106, 79, 0.03) 0%, transparent 50%),
                              radial-gradient(circle at 100% 100%, rgba(255, 159, 28, 0.03) 0%, transparent 50%);
        }

        /* --- 1. 鼠标跟随光晕 --- */
        .cursor-glow {
            position: fixed; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(45, 106, 79, 0.06) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 1; transform: translate(-50%, -50%);
            transition: opacity 0.3s ease;
        }

        /* --- 2. 侧边栏 (玻璃态) --- */
        .sidebar {
            width: 260px; background: var(--glass); backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0,0,0,0.05); position: fixed; height: 100vh;
            display: flex; flex-direction: column; z-index: 1000;
        }
        .sidebar-header { padding: 40px 25px; font-size: 1.5rem; font-weight: 900; color: var(--primary-green); letter-spacing: 1px; }
        .menu-item {
            padding: 18px 25px; color: #64748b; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; text-decoration: none; font-weight: 500; margin: 4px 15px; border-radius: 12px;
        }
        .menu-item i { margin-right: 15px; font-size: 1.1rem; transition: 0.3s; }
        .menu-item:hover { color: var(--primary-green); background: rgba(45, 106, 79, 0.05); transform: translateX(5px); }
        .menu-item.active { background: var(--primary-green); color: white; box-shadow: 0 10px 20px rgba(45, 106, 79, 0.2); }
        .menu-item.active i { color: white; }
        .menu-item.logout { margin-top: auto; color: #ef4444; margin-bottom: 30px; }
        .menu-item.logout:hover { background: #fee2e2; }

        /* --- 3. 动态内容区 --- */
        .main-content { margin-left: 260px; flex: 1; padding: 40px; position: relative; z-index: 2; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: contentAppear 0.6s ease-out forwards; }
        @keyframes contentAppear { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* 滚动浮现动画 */
        .reveal { opacity: 0; transform: translateY(30px); transition: 0.8s cubic-bezier(0.5, 0, 0, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* 玻璃卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px);
            border-radius: 24px; padding: 30px; border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 15px 35px rgba(0,0,0,0.02); margin-bottom: 30px; transition: 0.4s;
        }
        .glass-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(45, 106, 79, 0.08); }

        /* 欢迎横幅 */
        .welcome-banner {
            background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
            padding: 50px; border-radius: 30px; color: white; margin-bottom: 40px;
            position: relative; overflow: hidden; box-shadow: 0 20px 40px rgba(45, 106, 79, 0.2);
        }
        .welcome-banner::after {
            content: ''; position: absolute; top: -50%; right: -10%; width: 300px; height: 300px;
            background: rgba(255,255,255,0.1); border-radius: 50%;
        }

        /* 数字跳动 */
        .counter { font-size: 3.5rem; font-weight: 800; color: var(--primary-green); margin: 10px 0; display: block; }

        /* 磁性按钮 */
        .mag-btn {
            background: var(--accent-orange); color: white; border: none; padding: 10px 20px;
            border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .mag-btn:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(255, 159, 28, 0.3); }

        /* 进度条呼吸灯 */
        .pulse-dot {
            width: 12px; height: 12px; background: var(--primary-green); border-radius: 50%;
            position: relative; display: inline-block; margin-right: 10px;
        }
        .pulse-dot::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            background: inherit; border-radius: 50%; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }

        /* 表单 */
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 10px; font-weight: 600; color: #4b5563; }
        .form-group input, .form-group select { 
            width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; 
            transition: 0.3s; background: #f8fafc;
        }
        .form-group input:focus { border-color: var(--primary-green); outline: none; background: white; }
    </style>
</head>
<body>

    <!-- 动态光晕 -->
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- 侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-header">志愿者中心</div>
        <div class="sidebar-menu">
            <a href="index.html" class="menu-item"><i class="fas fa-home"></i> 微光循迹官网</a>
            <div class="menu-item active" onclick="showTab('tab-home', this)"><i class="fas fa-tachometer-alt"></i> 工作台首页</div>
            <div class="menu-item" onclick="showTab('tab-info', this)"><i class="fas fa-id-card"></i> 信息填写</div>
            <div class="menu-item" onclick="showTab('tab-safe', this)"><i class="fas fa-user-shield"></i> 账号安全</div>
            <div class="menu-item logout" onclick="handleLogout()"><i class="fas fa-power-off"></i> 退出账号</div>
        </div>
    </div>

    <!-- 内容区 -->
    <div class="main-content">
        
        <!-- Tab 1: 工作台 -->
        <div id="tab-home" class="tab-panel active">
            <div class="welcome-banner reveal">
                <h2 id="helloTitle">欢迎回来，伙伴！</h2>
                <p style="opacity: 0.9;">愿微光汇聚成炬，照亮大山的孩子。</p>
            </div>

            <div style="display: grid; grid-template-columns: 1.8fr 1fr; gap: 30px;">
                <!-- 左列 -->
                <div class="col">
                    <div class="glass-card reveal">
                        <h3 style="margin-bottom:20px;"><i class="fas fa-bullhorn" style="color:var(--accent-orange)"></i> 最新招募</h3>
                        <div style="padding:15px; border-left:4px solid #ef4444; background:rgba(239,68,68,0.03); margin-bottom:15px; border-radius:0 10px 10px 0;">
                            <strong>【紧急】凉山美姑县小学支教</strong>
                            <p style="font-size:0.85rem; color:#888;">我们需要艺术类专业的志愿者...</p>
                        </div>
                        <div style="padding:15px; border-left:4px solid #22c55e; background:rgba(34,197,94,0.03); border-radius:0 10px 10px 0;">
                            <strong>【火热】贵州大山镇机械科普</strong>
                            <p style="font-size:0.85rem; color:#888;">3D打印教具组装指导...</p>
                        </div>
                    </div>

                    <div class="glass-card reveal">
                        <h3 style="margin-bottom:20px;"><i class="fas fa-envelope-open-text" style="color:var(--primary-green)"></i> 认领漂流瓶</h3>
                        <table style="width:100%; border-collapse:collapse;">
                            <tr style="border-bottom:1px solid #f1f5f9;">
                                <td style="padding:15px 0;">“老师，那个斯特林发动机怎么组装？”</td>
                                <td style="text-align:right;"><button class="mag-btn" onclick="openAction('认领成功！')">认领</button></td>
                            </tr>
                            <tr>
                                <td style="padding:15px 0;">“我想看看外面的世界...”</td>
                                <td style="text-align:right;"><button class="mag-btn" onclick="openAction('认领成功！')">认领</button></td>
                            </tr>
                        </table>
                    </div>
                </div>

                <!-- 右列 -->
                <div class="col">
                    <div class="glass-card reveal" style="text-align:center;">
                        <h3>我的勋章</h3>
                        <div style="font-size:4rem; margin:20px 0; filter: drop-shadow(0 10px 15px rgba(245,158,11,0.3));">🥉</div>
                        <span class="counter" data-target="1">0</span>
                        <p style="color:#64748b; font-weight:500;">已点亮勋章</p>
                    </div>

                    <div class="glass-card reveal">
                        <h3>申请进度</h3>
                        <div style="margin-top:25px; padding-left:15px; border-left:2px solid #e2e8f0;">
                            <div style="margin-bottom:25px; position:relative;">
                                <i class="fas fa-check-circle" style="color:var(--primary-green); position:absolute; left:-23px; background:white;"></i>
                                <strong>提交申请</strong>
                            </div>
                            <div style="position:relative; color:var(--primary-green);">
                                <span class="pulse-dot" style="position:absolute; left:-21px; top:5px;"></span>
                                <strong>AI 智能审核中</strong>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab 2: 信息修改 -->
        <div id="tab-info" class="tab-panel">
            <div class="glass-card reveal">
                <h2 style="margin-bottom:30px;">个人信息登记</h2>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:30px;">
                    <div class="form-group"><label>用户名</label><input type="text" id="prof-user" disabled></div>
                    <div class="form-group"><label>身份</label><input type="text" value="志愿者" disabled></div>
                </div>
                <div class="form-group"><label>电子邮箱</label><input type="text" id="prof-mail" disabled></div>
                <hr style="margin:20px 0; opacity:0.1;">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:30px;">
                    <div class="form-group"><label>就读学校</label><input type="text" placeholder="输入学校名称"></div>
                    <div class="form-group"><label>专业</label><input type="text" placeholder="输入专业名称"></div>
                </div>
                <div class="form-group">
                    <label>个人证件照</label>
                    <button class="mag-btn" style="background:#10b981;" onclick="document.getElementById('fileInp').click()">访问电脑文件</button>
                    <input type="file" id="fileInp" hidden>
                </div>
                <div style="display:flex; gap:15px;">
                    <button class="mag-btn" style="background:#10b981; padding:15px 40px;">保存信息</button>
                    <button class="mag-btn" style="background:white; color:#10b981; border:2px solid #10b981; padding:15px 40px;">编辑模式</button>
                </div>
            </div>
        </div>

        <!-- Tab 3: 安全 -->
        <div id="tab-safe" class="tab-panel">
            <div class="glass-card reveal" style="max-width:500px;">
                <h2 style="margin-bottom:30px;">账户安全设置</h2>
                <div class="form-group"><label>旧密码</label><input type="password"></div>
                <div class="form-group"><label>新密码</label><input type="password"></div>
                <div class="form-group"><label>确认新密码</label><input type="password"></div>
                <button class="mag-btn" style="width:100%; padding:15px; background:var(--primary-green);">保存修改</button>
            </div>
        </div>

    </div>

    <script>
        // --- 1. 鼠标跟随特效 ---
        const glow = document.getElementById('cursorGlow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        // --- 2. 滚动浮现引擎 ---
        function reveal() {
            const reveals = document.querySelectorAll(".reveal");
            reveals.forEach(el => {
                const windowHeight = window.innerHeight;
                const elementTop = el.getBoundingClientRect().top;
                if (elementTop < windowHeight - 50) el.classList.add("active");
            });
        }
        window.addEventListener("scroll", reveal);

        // --- 3. 数字跳动引擎 ---
        function animateCounters() {
            const counters = document.querySelectorAll('.counter');
            counters.forEach(c => {
                const target = +c.dataset.target;
                let count = 0;
                const update = () => {
                    const inc = target / 20;
                    if (count < target) {
                        count += inc;
                        c.innerText = Math.ceil(count);
                        setTimeout(update, 50);
                    } else { c.innerText = target; }
                };
                update();
            });
        }

        // --- 4. 标签切换逻辑 ---
        function showTab(tabId, el) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            
            const activePanel = document.getElementById(tabId);
            activePanel.classList.add('active');
            el.classList.add('active');

            // 重新触发当前页面的动画
            window.scrollTo(0,0);
            setTimeout(() => {
                reveal();
                if(tabId === 'tab-home') animateCounters();
            }, 100);
        }

        // --- 5. 初始化 ---
        window.onload = function() {
            const user = JSON.parse(localStorage.getItem('user'));
            if(user) {
                document.getElementById('helloTitle').innerText = `欢迎回来，${user.username}！`;
                document.getElementById('prof-user').value = user.username;
                document.getElementById('prof-mail').value = user.email;
            }
            reveal();
            animateCounters();
        };

        function openAction(msg) { alert(msg); }
        
        function handleLogout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
